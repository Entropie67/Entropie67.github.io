<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSYCHO.MBTI // Profil de Personnalité</title>
<link rel="icon" type="image/png" href="EVA_42.png">
<link rel="apple-touch-icon" href="EVA_42.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-0: #0a0814;
    --bg-1: #14102a;
    --bg-2: #1d1640;
    --analysts:  #a64bff;
    --diplomats: #00ff9d;
    --sentinels: #00f0ff;
    --explorers: #ffd60a;
    --neon-magenta: #ff2bd6;
    --gold: #f7c948;
    --text-primary: #e8e0ff;
    --text-secondary: #a89cc8;
    --text-dim: #5e527d;
    --glass: rgba(28, 22, 60, 0.5);
    --glass-border: rgba(166, 75, 255, 0.25);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { overflow-x: hidden; }

  body {
    font-family: 'Rajdhani', 'Segoe UI', sans-serif;
    background: var(--bg-0);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    color: var(--text-primary);
    position: relative;
    overflow-y: auto;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 18% 12%, rgba(166, 75, 255, 0.20), transparent 50%),
      radial-gradient(ellipse at 82% 88%, rgba(0, 255, 157, 0.12), transparent 55%),
      radial-gradient(ellipse at 50% 50%, rgba(255, 214, 10, 0.06), transparent 60%),
      var(--bg-0);
    z-index: -2;
  }
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(166, 75, 255, 0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(166, 75, 255, 0.05) 1px, transparent 1px);
    background-size: 50px 50px;
    mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
    z-index: -1;
    animation: gridDrift 24s linear infinite;
  }
  @keyframes gridDrift {
    from { background-position: 0 0, 0 0; }
    to   { background-position: 50px 50px, 50px 50px; }
  }

  .container {
    background: var(--glass);
    backdrop-filter: blur(20px) saturate(140%);
    -webkit-backdrop-filter: blur(20px) saturate(140%);
    border: 1px solid var(--glass-border);
    width: 100%;
    max-width: 800px;
    padding: 36px 40px;
    position: relative;
    box-shadow:
      0 0 0 1px rgba(255, 255, 255, 0.04) inset,
      0 8px 32px rgba(0, 0, 0, 0.5),
      0 0 60px rgba(166, 75, 255, 0.08);
    clip-path: polygon(
      24px 0, 100% 0, 100% calc(100% - 24px),
      calc(100% - 24px) 100%, 0 100%, 0 24px
    );
  }
  .container::before, .container::after {
    content: '';
    position: absolute;
    width: 28px; height: 28px;
    border: 2px solid var(--analysts);
    pointer-events: none;
  }
  .container::before { top: 8px; left: 8px; border-right: none; border-bottom: none; }
  .container::after  { bottom: 8px; right: 8px; border-left: none; border-top: none; }

  h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.85em;
    font-weight: 900;
    letter-spacing: 4px;
    text-transform: uppercase;
    background: linear-gradient(90deg, var(--analysts), var(--diplomats), var(--sentinels), var(--explorers));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 6px;
    text-shadow: 0 0 24px rgba(166, 75, 255, 0.35);
  }
  .subtitle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78em;
    color: var(--analysts);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid rgba(166, 75, 255, 0.18);
  }

  /* === Intro === */
  .intro p { color: var(--text-secondary); line-height: 1.65; margin-bottom: 14px; }
  .intro p strong { color: var(--text-primary); }
  .intro p em { color: var(--diplomats); font-style: italic; }
  .intro ul {
    list-style: none;
    padding: 0;
    margin: 18px 0 22px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  @media (max-width: 600px) { .intro ul { grid-template-columns: 1fr; } }
  .intro ul li {
    background: rgba(166, 75, 255, 0.06);
    border: 1px solid rgba(166, 75, 255, 0.18);
    border-left: 3px solid var(--analysts);
    padding: 12px 14px;
    font-size: 0.94em;
    color: var(--text-secondary);
  }
  .intro ul li strong { color: var(--text-primary); display: block; margin-bottom: 2px; font-family: 'JetBrains Mono', monospace; font-size: 0.78em; letter-spacing: 0.12em; color: var(--analysts); }
  .intro ul li.diplomats { border-left-color: var(--diplomats); background: rgba(0, 255, 157, 0.05); }
  .intro ul li.diplomats strong { color: var(--diplomats); }
  .intro ul li.sentinels { border-left-color: var(--sentinels); background: rgba(0, 240, 255, 0.05); }
  .intro ul li.sentinels strong { color: var(--sentinels); }
  .intro ul li.explorers { border-left-color: var(--explorers); background: rgba(255, 214, 10, 0.05); }
  .intro ul li.explorers strong { color: var(--explorers); }

  .protocol {
    background: rgba(255, 43, 214, 0.05);
    border: 1px solid rgba(255, 43, 214, 0.2);
    border-left: 3px solid var(--neon-magenta);
    padding: 14px 18px;
    font-size: 0.92em;
    color: var(--text-secondary);
    line-height: 1.55;
    margin-bottom: 18px;
  }
  .protocol strong { color: var(--neon-magenta); }
  .disclaimer {
    font-size: 0.82em;
    color: var(--text-dim);
    line-height: 1.5;
    margin-bottom: 22px;
    font-style: italic;
  }
  .disclaimer strong { color: var(--text-secondary); font-style: normal; }

  /* === Buttons === */
  button, .btn {
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-size: 0.85em;
    padding: 13px 28px;
    border: 1px solid var(--analysts);
    background: linear-gradient(90deg, rgba(166, 75, 255, 0.18), rgba(0, 255, 157, 0.18));
    color: var(--text-primary);
    transition: all 0.2s ease;
    position: relative;
  }
  button:hover:not(:disabled), .btn:hover {
    background: linear-gradient(90deg, rgba(166, 75, 255, 0.4), rgba(0, 255, 157, 0.3));
    box-shadow: 0 0 22px rgba(166, 75, 255, 0.4);
  }
  button:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }
  button.secondary {
    background: transparent;
    border-color: var(--text-dim);
    color: var(--text-secondary);
  }
  button.secondary:hover:not(:disabled) {
    border-color: var(--analysts);
    color: var(--text-primary);
    box-shadow: 0 0 14px rgba(166, 75, 255, 0.25);
  }

  /* === Progress === */
  .progress-wrap { margin-bottom: 22px; }
  .progress-bar {
    height: 4px;
    background: rgba(166, 75, 255, 0.12);
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--analysts), var(--diplomats), var(--sentinels), var(--explorers));
    transition: width 0.4s ease;
    box-shadow: 0 0 12px rgba(166, 75, 255, 0.6);
  }
  .progress-text {
    display: flex;
    justify-content: space-between;
    margin-top: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.74em;
    color: var(--text-dim);
    letter-spacing: 0.1em;
  }
  .progress-text .axis-now { color: var(--analysts); }

  /* === Question === */
  .axis-tag {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7em;
    letter-spacing: 0.18em;
    padding: 3px 10px;
    border: 1px solid;
    margin-bottom: 14px;
  }
  .axis-EI { color: var(--analysts); border-color: rgba(166,75,255,0.4); background: rgba(166,75,255,0.08); }
  .axis-SN { color: var(--diplomats); border-color: rgba(0,255,157,0.4); background: rgba(0,255,157,0.08); }
  .axis-TF { color: var(--sentinels); border-color: rgba(0,240,255,0.4); background: rgba(0,240,255,0.08); }
  .axis-JP { color: var(--explorers); border-color: rgba(255,214,10,0.4); background: rgba(255,214,10,0.08); }

  .question-text {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.4em;
    line-height: 1.4;
    color: var(--text-primary);
    margin: 8px 0 24px;
    font-weight: 500;
  }

  .likert {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 24px;
  }
  .likert-opt {
    display: grid;
    grid-template-columns: 60px 1fr;
    align-items: center;
    gap: 14px;
    background: rgba(166, 75, 255, 0.04);
    border: 1px solid rgba(166, 75, 255, 0.15);
    color: var(--text-primary);
    padding: 12px 18px;
    text-align: left;
    text-transform: none;
    letter-spacing: 0;
    font-family: 'Rajdhani', sans-serif;
    font-size: 1em;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .likert-opt:hover:not(.selected) {
    background: rgba(166, 75, 255, 0.10);
    border-color: var(--analysts);
  }
  .likert-opt.selected {
    background: linear-gradient(90deg, rgba(166, 75, 255, 0.25), rgba(0, 255, 157, 0.10));
    border-color: var(--analysts);
    box-shadow: 0 0 14px rgba(166, 75, 255, 0.3);
  }
  .likert-opt .pip {
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 0.85em;
    color: var(--text-dim);
    letter-spacing: 0;
  }
  .likert-opt[data-v="2"]  .pip { color: var(--diplomats); }
  .likert-opt[data-v="1"]  .pip { color: var(--sentinels); }
  .likert-opt[data-v="0"]  .pip { color: var(--text-dim); }
  .likert-opt[data-v="-1"] .pip { color: var(--explorers); }
  .likert-opt[data-v="-2"] .pip { color: var(--neon-magenta); }
  .likert-opt.selected .pip { color: var(--text-primary); text-shadow: 0 0 10px currentColor; }

  .nav-buttons {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    margin-top: 20px;
  }
  .nav-buttons button { flex: 1; }

  /* === Result === */
  .result-hero {
    text-align: center;
    padding: 18px 0 26px;
    border-bottom: 1px solid rgba(166, 75, 255, 0.18);
    margin-bottom: 26px;
  }
  .result-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72em;
    letter-spacing: 0.22em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .result-letters {
    font-family: 'Orbitron', sans-serif;
    font-size: 4.4em;
    font-weight: 900;
    letter-spacing: 0.06em;
    line-height: 1;
    margin-bottom: 10px;
    background: linear-gradient(180deg, var(--text-primary), var(--analysts));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 30px currentColor;
  }
  .result-archetype {
    font-family: 'Cormorant Garamond', 'Rajdhani', serif;
    font-size: 1.5em;
    font-style: italic;
    color: var(--text-primary);
    margin-bottom: 6px;
  }
  .result-group {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75em;
    letter-spacing: 0.18em;
    color: var(--text-secondary);
    text-transform: uppercase;
  }

  /* group accents */
  .group-analysts  .result-letters { background: linear-gradient(180deg, var(--text-primary), var(--analysts)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  .group-analysts  .result-letters,
  .group-analysts  .result-group { text-shadow: 0 0 30px rgba(166,75,255,0.5); }
  .group-analysts  .result-group { color: var(--analysts); }
  .group-diplomats .result-letters { background: linear-gradient(180deg, var(--text-primary), var(--diplomats)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  .group-diplomats .result-letters,
  .group-diplomats .result-group { text-shadow: 0 0 30px rgba(0,255,157,0.5); }
  .group-diplomats .result-group { color: var(--diplomats); }
  .group-sentinels .result-letters { background: linear-gradient(180deg, var(--text-primary), var(--sentinels)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  .group-sentinels .result-letters,
  .group-sentinels .result-group { text-shadow: 0 0 30px rgba(0,240,255,0.5); }
  .group-sentinels .result-group { color: var(--sentinels); }
  .group-explorers .result-letters { background: linear-gradient(180deg, var(--text-primary), var(--explorers)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  .group-explorers .result-letters,
  .group-explorers .result-group { text-shadow: 0 0 30px rgba(255,214,10,0.5); }
  .group-explorers .result-group { color: var(--explorers); }

  .result-desc {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.08em;
    line-height: 1.65;
    color: var(--text-primary);
    margin-bottom: 24px;
    border-left: 2px solid var(--analysts);
    padding-left: 16px;
  }
  .group-diplomats .result-desc { border-left-color: var(--diplomats); }
  .group-sentinels .result-desc { border-left-color: var(--sentinels); }
  .group-explorers .result-desc { border-left-color: var(--explorers); }

  /* axis bars */
  .axis-bars {
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-bottom: 28px;
  }
  .axis-bar { font-family: 'JetBrains Mono', monospace; font-size: 0.78em; }
  .axis-bar .ab-labels {
    display: flex;
    justify-content: space-between;
    margin-bottom: 4px;
    letter-spacing: 0.1em;
  }
  .axis-bar .ab-labels .strong { color: var(--text-primary); font-weight: 700; }
  .axis-bar .ab-labels .weak { color: var(--text-dim); }
  .axis-bar .track {
    height: 8px;
    background: rgba(255, 255, 255, 0.05);
    position: relative;
    border-radius: 0;
  }
  .axis-bar .track .center {
    position: absolute;
    left: 50%;
    top: -2px;
    bottom: -2px;
    width: 1px;
    background: rgba(255,255,255,0.18);
  }
  .axis-bar .fill {
    height: 100%;
    transition: width 0.6s ease;
    box-shadow: 0 0 10px currentColor;
  }
  .axis-bar.left-side .fill {
    margin-left: auto;
    transform-origin: right;
  }
  .axis-bar.EI .fill { background: var(--analysts); color: var(--analysts); }
  .axis-bar.SN .fill { background: var(--diplomats); color: var(--diplomats); }
  .axis-bar.TF .fill { background: var(--sentinels); color: var(--sentinels); }
  .axis-bar.JP .fill { background: var(--explorers); color: var(--explorers); }

  /* Profile cards */
  .profiles {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 24px;
  }
  @media (max-width: 700px) { .profiles { grid-template-columns: 1fr; } }
  .profile-card {
    background: rgba(166, 75, 255, 0.06);
    border: 1px solid rgba(166, 75, 255, 0.20);
    border-top: 3px solid var(--analysts);
    padding: 20px 22px;
    position: relative;
  }
  .profile-card.character {
    border-top-color: var(--diplomats);
    background: rgba(0, 255, 157, 0.05);
    border-color: rgba(0, 255, 157, 0.18);
  }
  .profile-card .ptag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7em;
    color: var(--analysts);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .profile-card.character .ptag { color: var(--diplomats); }
  .profile-card .pname {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.15em;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: 0.02em;
    margin-bottom: 2px;
    line-height: 1.2;
  }
  .profile-card .puni {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.92em;
    color: var(--text-secondary);
    margin-bottom: 12px;
    font-style: italic;
  }
  .profile-card .pbyline {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1em;
    line-height: 1.55;
    color: var(--text-primary);
    border-left: 2px solid rgba(166, 75, 255, 0.45);
    padding-left: 12px;
  }
  .profile-card.character .pbyline { border-left-color: rgba(0, 255, 157, 0.5); }

  .compatibility {
    margin-top: 22px;
    padding: 14px 18px;
    background: rgba(255, 43, 214, 0.05);
    border-left: 3px solid var(--neon-magenta);
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.95em;
    color: var(--text-secondary);
    line-height: 1.6;
  }
  .compatibility b { color: var(--neon-magenta); }

  .restart-wrap {
    margin-top: 24px;
    text-align: center;
    border-top: 1px solid rgba(166, 75, 255, 0.15);
    padding-top: 22px;
  }
  .seal {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72em;
    color: var(--text-dim);
    letter-spacing: 0.16em;
    margin-bottom: 14px;
  }
</style>
</head>
<body>

<div class="container" id="app"></div>

<script>
// =====================================================================
// QUESTIONS — 64 (16 par axe). dir = côté favorisé en cas d'accord.
// =====================================================================
const QUESTIONS = [
  // ───────── E / I (16) ─────────
  { axis: 'EI', dir: 'E', q: "Une soirée animée me recharge plus qu'elle ne me fatigue." },
  { axis: 'EI', dir: 'I', q: "Après une journée chargée, j'ai besoin d'un long temps seul pour me recharger." },
  { axis: 'EI', dir: 'E', q: "Je préfère parler de mes idées plutôt que de les ruminer en silence." },
  { axis: 'EI', dir: 'I', q: "Je réfléchis longtemps avant de dire ce que je pense." },
  { axis: 'EI', dir: 'E', q: "Quand un sujet m'intéresse, j'ai envie d'en discuter à voix haute." },
  { axis: 'EI', dir: 'I', q: "Je préfère écouter en réunion plutôt que prendre la parole." },
  { axis: 'EI', dir: 'E', q: "Je trouve facilement la parole face à des inconnus." },
  { axis: 'EI', dir: 'I', q: "Une conversation profonde avec une seule personne me convient mieux qu'une fête." },
  { axis: 'EI', dir: 'E', q: "Le silence prolongé dans une conversation me met mal à l'aise." },
  { axis: 'EI', dir: 'I', q: "Je me sens drainé·e par les interactions sociales prolongées." },
  { axis: 'EI', dir: 'E', q: "J'aime travailler en équipe plutôt que seul·e." },
  { axis: 'EI', dir: 'I', q: "Je travaille mieux en silence, isolé·e du bruit ambiant." },
  { axis: 'EI', dir: 'E', q: "Mon énergie vient souvent du contact avec d'autres personnes." },
  { axis: 'EI', dir: 'I', q: "Je n'ai pas besoin de parler beaucoup pour me sentir bien." },
  { axis: 'EI', dir: 'E', q: "Je préfère un week-end rempli d'événements à un week-end calme." },
  { axis: 'EI', dir: 'I', q: "J'évite naturellement les grandes foules." },

  // ───────── S / N (16) ─────────
  { axis: 'SN', dir: 'S', q: "Je préfère les faits concrets aux théories abstraites." },
  { axis: 'SN', dir: 'N', q: "Les idées et les possibilités m'intéressent plus que les détails concrets." },
  { axis: 'SN', dir: 'S', q: "Les détails pratiques m'importent plus que les concepts généraux." },
  { axis: 'SN', dir: 'N', q: "Je fais facilement des associations entre des domaines qui semblent éloignés." },
  { axis: 'SN', dir: 'S', q: "Je fais davantage confiance à ce que j'ai déjà expérimenté qu'à ce que j'imagine." },
  { axis: 'SN', dir: 'N', q: "Les métaphores me parlent davantage que les explications littérales." },
  { axis: 'SN', dir: 'S', q: "Quand on m'explique quelque chose, j'aime des exemples précis." },
  { axis: 'SN', dir: 'N', q: "Je préfère imaginer ce qui pourrait être plutôt que ce qui est." },
  { axis: 'SN', dir: 'S', q: "Je préfère un plan clair étape par étape à une vision d'ensemble floue." },
  { axis: 'SN', dir: 'N', q: "Mon esprit dérive souvent vers ce qui n'existe pas encore." },
  { axis: 'SN', dir: 'S', q: "Je remarque rapidement les détails matériels d'un environnement." },
  { axis: 'SN', dir: 'N', q: "Une intuition forte vaut, pour moi, plusieurs preuves matérielles." },
  { axis: 'SN', dir: 'S', q: "Le présent et le passé me parlent plus que des spéculations sur l'avenir." },
  { axis: 'SN', dir: 'N', q: "J'aime les conversations qui partent dans tous les sens." },
  { axis: 'SN', dir: 'S', q: "Je me méfie des intuitions sans preuve." },
  { axis: 'SN', dir: 'N', q: "Je vois souvent des liens cachés que d'autres ne voient pas." },

let currentQ = 0;
let answers = new Array(QUESTIONS.length).fill(null);

// =====================================================================
// Calcul du type
// =====================================================================
function computeResult() {
  const scores = { EI: 0, SN: 0, TF: 0, JP: 0 };
  const counts = { EI: 0, SN: 0, TF: 0, JP: 0 };
  QUESTIONS.forEach((q, i) => {
    const ans = answers[i];
    if (ans === null) return;
    // dir = E, S, T, J → +1 ; dir = I, N, F, P → -1
    const positive = ['E','S','T','J'].includes(q.dir);
    const sign = positive ? +1 : -1;
    scores[q.axis] += ans * sign;
    counts[q.axis] += 2; // max amplitude
  });
  const type =
    (scores.EI >= 0 ? 'E' : 'I') +
    (scores.SN >= 0 ? 'S' : 'N') +
    (scores.TF >= 0 ? 'T' : 'F') +
    (scores.JP >= 0 ? 'J' : 'P');

  // Pourcentages — pour les barres : pos = % vers la lettre dominante
  function pct(axis) {
    const max = counts[axis] || 1;
    const norm = (scores[axis] / max + 1) / 2; // 0 = full neg, 1 = full pos
    return Math.round(norm * 100);
  }
  return {
    type,
    scores,
    bars: {
      EI: pct('EI'), // % E
      SN: pct('SN'), // % S
      TF: pct('TF'), // % T
      JP: pct('JP')  // % J
    }
  };
}

    <h1>PSYCHO·MBTI</h1>
    <div class="subtitle">Profil de personnalité // 64 questions // ~7 min</div>

    <div class="intro">
      <p>
        Le QI mesure ce que vous pouvez résoudre. Le MBTI mesure
        <em>comment</em> vous arrivez aux réponses — et avec qui vous voudriez
        encore parler ensuite. Quatre axes, seize types, une cartographie de
        votre rythme intérieur.
      </p>
      <ul>
        <li><strong>Axe 01 · E / I</strong>Extraversion vs Introversion — d'où vient votre énergie.</li>
        <li class="diplomats"><strong>Axe 02 · S / N</strong>Sensation vs Intuition — comment vous percevez le réel.</li>
        <li class="sentinels"><strong>Axe 03 · T / F</strong>Logique vs Émotion — comment vous décidez.</li>
        <li class="explorers"><strong>Axe 04 · J / P</strong>Jugement vs Perception — comment vous structurez le temps.</li>
      </ul>
      <div class="protocol">
        <strong>Protocole.</strong> 64 affirmations. Pour chacune, indiquez votre niveau
        d'accord sur cinq paliers. Pas de bonne ou mauvaise réponse — répondez
        spontanément, sans optimiser. Le test n'est pas chronométré, mais il vaut
        mieux le faire d'une traite.
      </div>
      <div class="disclaimer">
        <strong>Avertissement.</strong> Le MBTI est un cadre de
        <em>best-fit</em>, non un verdict. Il oriente la conversation, il ne tranche pas
        l'identité. Le résultat affiché est indicatif — l'instrument prend tout son sens
        si vous l'utilisez comme une lampe, pas comme une étiquette.
      </div>

      <div style="text-align:center; margin-top: 26px;">
        <button onclick="startTest()">▶ Commencer le test</button>
      </div>
    </div>
  `;
}

function renderQuestion() {
  const q = QUESTIONS[currentQ];
  const total = QUESTIONS.length;
  const progress = (currentQ / total) * 100;
  const answered = answers.filter(a => a !== null).length;
  const axis = q.axis;
  const axisLabel = AXIS_LABEL[axis];

  const opts = [
    { v:  2, lbl: 'Tout à fait d\'accord' },
    { v:  1, lbl: 'Plutôt d\'accord' },
    { v:  0, lbl: 'Neutre' },
    { v: -1, lbl: 'Plutôt pas d\'accord' },
    { v: -2, lbl: 'Pas du tout d\'accord' }
  ];
  const pip = { 2:'++', 1:'+', 0:'~', '-1':'−', '-2':'−−' };

  const optsHtml = opts.map(o => `
    <button class="likert-opt ${answers[currentQ] === o.v ? 'selected' : ''}"
            data-v="${o.v}"
            onclick="selectAnswer(${o.v})">
      <span class="pip">${pip[o.v]}</span>
      <span>${o.lbl}</span>
    </button>
  `).join('');

  document.getElementById('app').innerHTML = `
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" style="width: ${progress}%"></div></div>
      <div class="progress-text">
        <span>QUESTION ${String(currentQ+1).padStart(2,'0')} / ${total}</span>
        <span class="axis-now">AXE — ${axisLabel.code}</span>
        <span>${answered} / ${total} VALIDÉES</span>
      </div>
    </div>

    <span class="axis-tag axis-${axis}">${axisLabel.label}</span>
    <div class="question-text">${q.q}</div>
    <div class="likert">${optsHtml}</div>

    <div class="nav-buttons">
      <button class="secondary" onclick="prev()" ${currentQ === 0 ? 'disabled' : ''}>◀ Précédent</button>
      ${currentQ === total - 1
        ? `<button onclick="finish()" ${answered < total ? 'disabled' : ''}>⬢ Analyser</button>`
        : `<button onclick="next()" ${answers[currentQ] === null ? 'disabled' : ''}>Suivant ▶</button>`}
    </div>
  `;
}

function renderResult() {
  const r = computeResult();
  const t = TYPES[r.type] || TYPES.INTJ;

  function bar(axis, leftLetter, rightLetter, leftLabel, rightLabel) {
    const pctVal = r.bars[axis]; // % vers la première lettre
    const dom = pctVal >= 50 ? leftLetter : rightLetter;
    const display = pctVal >= 50 ? pctVal : (100 - pctVal);
    const fillClass = pctVal >= 50 ? '' : 'left-side';
    const fillWidth = pctVal >= 50 ? pctVal : (100 - pctVal);
    return `
      <div class="axis-bar ${axis} ${fillClass}">
        <div class="ab-labels">
          <span class="${pctVal >= 50 ? 'strong' : 'weak'}">${leftLetter} · ${leftLabel}</span>
          <span>${dom} ${display}%</span>
          <span class="${pctVal < 50 ? 'strong' : 'weak'}">${rightLabel} · ${rightLetter}</span>
        </div>
        <div class="track">
          <div class="center"></div>
          <div class="fill" style="width: ${fillWidth}%"></div>
        </div>
      </div>
    `;
  }

  document.getElementById('app').innerHTML = `
    <div class="group-${t.group}">
      <div class="result-hero">
        <div class="result-tag">DIAGNOSTIC TERMINÉ // PROFIL ÉTABLI</div>
        <div class="result-letters">${r.type}</div>
        <div class="result-archetype">${t.name}</div>
        <div class="result-group">${t.groupLabel}</div>
      </div>

      <div class="result-desc">${t.desc}</div>

      <div class="axis-bars">
        ${bar('EI', 'E', 'I', 'Extraversion',  'Introversion')}
        ${bar('SN', 'S', 'N', 'Sensation',     'Intuition')}
        ${bar('TF', 'T', 'F', 'Logique',       'Émotion')}
        ${bar('JP', 'J', 'P', 'Jugement',      'Perception')}
      </div>

      <div style="font-family: 'JetBrains Mono', monospace; font-size: 0.74em; letter-spacing: 0.18em; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid rgba(166,75,255,0.18);">
        — Vos miroirs · ${r.type} —
      </div>

      <div class="profiles">
        <article class="profile-card actress">
          <div class="ptag">Actrice · Réelle</div>
          <div class="pname">${t.actress.name}</div>
          <div class="puni">${t.actress.uni}</div>
          <div class="pbyline">${t.actress.byline}</div>
        </article>
        <article class="profile-card character">
          <div class="ptag">Personnage · Imaginaire</div>
          <div class="pname">${t.character.name}</div>
          <div class="puni">${t.character.uni}</div>
          <div class="pbyline">${t.character.byline}</div>
        </article>
      </div>

      <div class="compatibility">
        <b>Note d'EVA·42.</b> Le MBTI n'est pas une étiquette mais un <em>angle</em>.
        Deux personnes du même type peuvent vivre des vies opposées ; deux personnes
        de types très différents peuvent se reconnaître au premier regard. Lisez vos
        miroirs comme des <em>indices</em>, pas comme des verdicts. Et notez : le
        miroir qui vous gêne vous apprendra plus que celui qui vous flatte.
      </div>

      <div class="restart-wrap">
        <div class="seal">⚿ scellé sha-256 · révisable à tout moment</div>
        <button class="secondary" onclick="restart()">↺ Refaire le test</button>
      </div>
    </div>
  `;
}

// =====================================================================
// Actions
// =====================================================================
function startTest() {
  currentQ = 0;
  answers = new Array(QUESTIONS.length).fill(null);
  phase = 'test';
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
function selectAnswer(v) {
  answers[currentQ] = v;
  render();
}
function next() {
  if (currentQ < QUESTIONS.length - 1) {
    currentQ++;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}
function prev() {
  if (currentQ > 0) {
    currentQ--;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}
function finish() {
  phase = 'result';
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
function restart() {
  phase = 'intro';
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

render();
</script>

</body>
</html>
